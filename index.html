<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNO No Mercy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f23; color: #fff; }

      /* Card animations */
      @keyframes cardDeal {
        from { transform: translateY(-50px) scale(0.8); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes cardPlay {
        from { transform: scale(1); }
        50% { transform: scale(1.2) rotate(5deg); }
        to { transform: scale(1); }
      }
      @keyframes cardGlow {
        0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
        50% { box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.3); }
      }
      @keyframes slideIn {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes bounceIn {
        0% { transform: scale(0.3); opacity: 0; }
        50% { transform: scale(1.05); }
        70% { transform: scale(0.9); }
        100% { transform: scale(1); opacity: 1; }
      }

      .card-enter { animation: cardDeal 0.3s ease-out; }
      .card-playable { animation: cardGlow 2s infinite; }
      .card-played { animation: cardPlay 0.4s ease-out; }
      .slide-in { animation: slideIn 0.3s ease-out; }
      .fade-in { animation: fadeIn 0.4s ease-out; }
      .bounce-in { animation: bounceIn 0.5s ease-out; }
      .pulse { animation: pulse 2s infinite; }

      /* Card hover effects */
      .game-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
      .game-card:hover { transform: translateY(-12px) !important; }
      .game-card.playable:hover { box-shadow: 0 0 24px rgba(255,215,0,0.9) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.jsx"></script>
  </body>
</html>
